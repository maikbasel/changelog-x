[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
ignore = [
    # Transitive deps - unmaintained (no upstream fix available, revisit by 2026-06-07)
    { id = "RUSTSEC-2025-0141", reason = "bincode via git-cliff-core - transitive" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix via indicatif - transitive" },
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error via git-cliff-core/rust-embed - transitive" },
    # Transitive dep - time DoS vulnerability (via git-cliff-core, revisit by 2026-06-07)
    { id = "RUSTSEC-2026-0009", reason = "time via git-cliff-core - transitive" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]